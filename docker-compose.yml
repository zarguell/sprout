services:
  sprout:
    image: zarguell/sprout:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8000"
    volumes:
      - sprout-data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sprout-data:
