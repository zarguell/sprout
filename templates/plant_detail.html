{% extends "base.html" %}
{% block title %}{{ plant.name }} — Sprout{% endblock %}
{% block head_extra %}
<script id="plant-data" type="application/json">{{ plant | tojson }}</script>
<script id="tasks-data" type="application/json">{{ tasks | tojson }}</script>
<script id="photos-data" type="application/json">{{ photos | tojson }}</script>
<script id="activity-data" type="application/json">{{ activity | tojson }}</script>
{% endblock %}
{% block content %}
<div x-data="plantDetailData()">
    <!-- Back link -->
    <a href="/" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-emerald-700 mb-4">
        ← Back to Dashboard
    </a>

    <!-- Plant Header -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-start justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-900" x-text="plant.name"></h1>
                <p x-show="plant.species" class="text-gray-500 italic mt-1" x-text="plant.species"></p>
                <p x-show="plant.location" class="text-sm text-gray-400 mt-1" x-text="'📍 ' + plant.location"></p>
                <p x-show="plant.notes" class="text-sm text-gray-400 mt-0.5" x-text="plant.notes"></p>
                <p x-show="plant.archived" class="text-sm text-amber-600 mt-1">Archived</p>
            </div>
            <div class="flex gap-2">
                <button @click="editing = true"
                        class="text-sm border border-gray-300 rounded px-3 py-1 text-gray-600 hover:bg-gray-50">
                    Edit
                </button>
                <button @click="archivePlant()"
                        class="text-sm border border-amber-300 rounded px-3 py-1 text-amber-700 hover:bg-amber-50">
                    Archive
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Plant Modal -->
    <div x-show="editing" x-cloak class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
         @click.self="editing = false">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
            <h2 class="text-lg font-semibold mb-4">Edit Plant</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                    <input x-model="editForm.name" required
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Species</label>
                    <input x-model="editForm.species"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input x-model="editForm.location"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                    <textarea x-model="editForm.notes" rows="2"
                              class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-5">
                <button @click="editing = false" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</button>
                <button @click="savePlant()" :disabled="!editForm.name || saving"
                        class="bg-emerald-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-emerald-700 disabled:opacity-50">
                    <span x-show="!saving">Save</span>
                    <span x-show="saving">Saving…</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Tasks Section -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Tasks</h2>
            <div class="flex gap-2">
                <button @click="showAddTask = true"
                        class="bg-emerald-600 text-white px-3 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700">+ Add Task</button>
            </div>
        </div>

        <!-- Add Task Form (inline) -->
        <div x-show="showAddTask" x-cloak class="mb-4 p-4 bg-gray-50 rounded-md border border-gray-200 space-y-2">
            <select x-model="taskForm.type"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="water">💧 Water</option>
                <option value="fertilize">🧪 Fertilize</option>
                <option value="repot">🪴 Repot</option>
                <option value="custom">📋 Custom</option>
            </select>
            <input x-model="taskForm.label" placeholder="Label (optional)"
                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <input x-model="taskForm.due_date" type="date"
                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <input type="number" x-model="taskForm.interval_days" placeholder="Every N days (optional)"
                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
            <div class="flex justify-end gap-2">
                <button @click="showAddTask = false" class="px-3 py-1.5 text-sm text-gray-600">Cancel</button>
                <button @click="addTask()" :disabled="!taskForm.due_date || saving"
                        class="bg-emerald-600 text-white px-3 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 disabled:opacity-50">
                    <span x-show="!saving">Create</span>
                    <span x-show="saving">Creating…</span>
                </button>
            </div>
        </div>

        <template x-if="tasks.length === 0">
            <p class="text-gray-400 text-sm">No tasks yet.</p>
        </template>
        <template x-for="task in tasks" :key="task.id">
            <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                <div class="flex items-center gap-2">
                    <span x-text="taskIcon(task.type)"></span>
                    <span class="text-sm text-gray-700" x-text="task.label || task.type"></span>
                    <span class="text-xs text-gray-400" x-text="new Date(task.due_date).toLocaleDateString()"></span>
                    <span x-show="task.interval_days" class="text-xs text-blue-500" x-text="recurrenceLabel(task.interval_days)"></span>
                </div>
                <button @click="completeTask(task.id)" class="text-xs text-emerald-600 hover:text-emerald-800 font-medium">
                    Complete
                </button>
            </div>
        </template>
    </div>

    <!-- Activity Section -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Activity Log</h2>
            <button @click="showAddActivity = true"
                    class="bg-white border border-gray-300 text-gray-600 px-3 py-1.5 rounded-md text-sm font-medium hover:bg-gray-50">+ Log</button>
        </div>

        <!-- Add Activity Form (inline) -->
        <div x-show="showAddActivity" x-cloak class="mb-4 p-4 bg-gray-50 rounded-md border border-gray-200 space-y-2">
            <select x-model="activityForm.type"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm">
                <option value="water">💧 Watered</option>
                <option value="fertilize">🧪 Fertilized</option>
                <option value="repot">🪴 Repotted</option>
                <option value="prune">✂️ Pruned</option>
                <option value="note">📝 Note</option>
            </select>
            <textarea x-model="activityForm.notes" placeholder="Notes (optional)" rows="2"
                      class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm"></textarea>
            <div class="flex justify-end gap-2">
                <button @click="showAddActivity = false" class="px-3 py-1.5 text-sm text-gray-600">Cancel</button>
                <button @click="addActivity()" :disabled="!activityForm.type || saving"
                        class="bg-emerald-600 text-white px-3 py-1.5 rounded-md text-sm font-medium hover:bg-emerald-700 disabled:opacity-50">
                    <span x-show="!saving">Log</span>
                    <span x-show="saving">Logging…</span>
                </button>
            </div>
        </div>

        <template x-if="activity.length === 0">
            <p class="text-gray-400 text-sm">No activity logged yet.</p>
        </template>
        <template x-for="entry in activity" :key="entry.id">
            <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                <div class="flex items-center gap-2">
                    <span x-text="activityIcon(entry.type)"></span>
                    <span class="text-sm text-gray-700" x-text="entry.notes || entry.type"></span>
                </div>
                <span class="text-xs text-gray-400" x-text="new Date(entry.created_at).toLocaleDateString()"></span>
            </div>
        </template>
    </div>

    <!-- Photos Section -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Photos</h2>
        <div x-show="!uploadPreview" class="mb-4 flex gap-3">
            <input type="file" x-ref="photoInput" @change="handlePhotoUpload($event)" accept="image/*"
                   class="block w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-medium file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
        </div>
        <div x-show="uploadPreview" class="mb-4">
            <img :src="uploadPreview" class="h-32 w-auto rounded mb-2">
            <input type="text" x-model="uploadCaption" placeholder="Caption (optional)"
                   class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm mb-2">
            <div class="flex gap-2">
                <button @click="submitPhoto()" :disabled="uploading"
                        class="bg-emerald-600 text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-emerald-700 disabled:opacity-50">
                    <span x-show="!uploading">Upload</span>
                    <span x-show="uploading">Uploading…</span>
                </button>
                <button @click="cancelUpload()" class="px-3 py-1.5 text-sm text-gray-600">Cancel</button>
            </div>
        </div>
        <template x-if="photos.length === 0">
            <p class="text-gray-400 text-sm">No photos yet.</p>
        </template>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <template x-for="photo in photos" :key="photo.id">
                <div class="rounded-md overflow-hidden bg-gray-100 relative">
                    <img :src="photo.url" class="w-full h-40 object-cover" :class="{ 'opacity-60': photo.is_primary }" alt="">
                    <span x-show="photo.is_primary" class="absolute top-1 left-1 bg-emerald-600 text-white text-xs px-1.5 py-0.5 rounded">Primary</span>
                    <button x-show="!photo.is_primary" @click="setPrimaryPhoto(photo.id)"
                            class="absolute top-1 right-1 bg-black/50 text-white text-xs px-1.5 py-0.5 rounded hover:bg-black/70">
                        Set as Primary
                    </button>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function plantDetailData() {
    return {
        plant: JSON.parse(document.getElementById('plant-data').textContent),
        tasks: JSON.parse(document.getElementById('tasks-data').textContent),
        photos: JSON.parse(document.getElementById('photos-data').textContent),
        activity: JSON.parse(document.getElementById('activity-data').textContent),
        editing: false,
        showAddTask: false,
        showAddActivity: false,
        saving: false,
        editForm: { name: '', species: '', location: '', notes: '' },
        taskForm: { type: 'water', label: '', due_date: '', interval_days: '' },
        activityForm: { type: 'water', notes: '' },
        uploadCaption: '',
        uploadPreview: null,
        uploading: false,
        init() {
            this.editForm = {
                name: this.plant.name || '',
                species: this.plant.species || '',
                location: this.plant.location || '',
                notes: this.plant.notes || ''
            };
        },
        async savePlant() {
            this.saving = true;
            const body = new URLSearchParams();
            for (const [k, v] of Object.entries(this.editForm)) if (v) body.set(k, v);
            const res = await fetch('/api/plants/' + this.plant.id, { method: 'PUT', body });
            if (res.ok) location.reload();
            this.saving = false;
        },
        async archivePlant() {
            const res = await fetch('/api/plants/' + this.plant.id + '/archive', { method: 'POST' });
            if (res.ok) location.reload();
        },
        async addTask() {
            this.saving = true;
            const body = new URLSearchParams();
            body.set('type', this.taskForm.type);
            body.set('due_date', this.taskForm.due_date);
            if (this.taskForm.label) body.set('label', this.taskForm.label);
            if (this.taskForm.interval_days) body.set('interval_days', this.taskForm.interval_days);
            const res = await fetch('/api/plants/' + this.plant.id + '/tasks', { method: 'POST', body });
            if (res.ok) location.reload();
            this.saving = false;
        },
        async completeTask(taskId) {
            const res = await fetch('/api/plants/' + this.plant.id + '/tasks/' + taskId + '/complete', { method: 'POST' });
            if (res.ok) location.reload();
        },
        async addActivity() {
            this.saving = true;
            const body = new URLSearchParams();
            body.set('type', this.activityForm.type);
            if (this.activityForm.notes) body.set('notes', this.activityForm.notes);
            const res = await fetch('/api/plants/' + this.plant.id + '/activity', { method: 'POST', body });
            if (res.ok) location.reload();
            this.saving = false;
        },
        taskIcon(type) {
            return { water: '💧', fertilize: '🧪', repot: '🪴', custom: '📋' }[type] || '📋';
        },
        activityIcon(type) {
            return { water: '💧', fertilize: '🧪', repot: '🪴', prune: '✂️', note: '📝' }[type] || '📝';
        },
        async handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            this.uploadPreview = URL.createObjectURL(file);
            this.uploadCaption = '';
        },
        async submitPhoto() {
            const file = this.$refs.photoInput.files[0];
            if (!file) return;
            this.uploading = true;
            const body = new FormData();
            body.set('file', file);
            if (this.uploadCaption) body.set('caption', this.uploadCaption);
            const res = await fetch('/api/plants/' + this.plant.id + '/photos/', { method: 'POST', body });
            this.uploading = false;
            if (res.ok) location.reload();
        },
        async setPrimaryPhoto(photoId) {
            const res = await fetch('/api/plants/' + this.plant.id + '/photos/' + photoId + '/set-primary', { method: 'POST' });
            if (res.ok) location.reload();
        },
        cancelUpload() {
            this.uploadPreview = null;
            this.$refs.photoInput.value = '';
        },
        recurrenceLabel(interval) {
            if (interval === 7) return 'Weekly';
            if (interval === 14) return 'Biweekly';
            if (interval === 30) return 'Monthly';
            return 'Every ' + interval + ' days';
        }
    };
}
</script>
{% endblock %}
