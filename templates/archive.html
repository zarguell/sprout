{% extends "base.html" %}
{% block title %}Archive — Sprout{% endblock %}
{% block content %}
<div x-data="{
    plants: {{ plants | tojson }},
    taskIcon(type) {
        return { water: '💧', fertilize: '🧪', repot: '🪴', custom: '📋' }[type] || '📋';
    }
}">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Archived Plants</h1>
    </div>

    <div x-show="plants.length === 0" class="text-center py-16">
        <div class="text-5xl mb-4">📦</div>
        <p class="text-gray-500">No archived plants.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="plant in plants" :key="plant.id">
            <a :href="'/plants/' + plant.id"
               class="block bg-white rounded-lg shadow-sm hover:shadow-md transition border border-gray-200 overflow-hidden opacity-75">
                <div class="h-40 bg-gray-100 flex items-center justify-center">
                    <template x-if="plant.thumbnail_url">
                        <img :src="plant.thumbnail_url" class="h-full w-full object-cover" alt="">
                    </template>
                    <template x-if="!plant.thumbnail_url">
                        <span class="text-4xl text-gray-300">🌿</span>
                    </template>
                </div>
                <div class="p-4">
                    <h3 class="font-semibold text-gray-900" x-text="plant.name"></h3>
                    <p x-show="plant.location" class="text-sm text-gray-500 mt-0.5" x-text="plant.location"></p>
                    <template x-if="plant.next_task">
                        <div class="mt-2">
                            <span class="inline-flex items-center gap-1 text-xs rounded-full px-2 py-0.5 bg-gray-100 text-gray-600">
                                <span x-text="taskIcon(plant.next_task.type)"></span>
                                <span x-text="plant.next_task.type"></span>
                            </span>
                        </div>
                    </template>
                </div>
            </a>
        </template>
    </div>
</div>
{% endblock %}
