<!DOCTYPE html>
<html lang="en" x-data="appState()" :class="{ 'dark': dark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#047857">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <title>{% block title %}Sprout{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="/static/js/plant-utils.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">
    <nav class="bg-emerald-700 dark:bg-emerald-900 text-white shadow">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">🌱 Sprout</a>
            <div class="flex items-center gap-4">
                <a href="/" class="hover:text-emerald-200 text-sm">Dashboard</a>
                <a href="/tasks" class="hover:text-emerald-200 text-sm">Tasks</a>
                <a href="/archive" class="hover:text-emerald-200 text-sm">Archive</a>
                <button @click="toggleDark()"
                        class="text-base cursor-pointer bg-transparent border-none hover:text-emerald-200"
                        :title="dark ? 'Switch to light mode' : 'Switch to dark mode'"
                        x-text="dark ? '\u2600\uFE0F' : '\uD83C\uDF19'">
                </button>
                <button @click="fetch('/api/auth/revoke', {method:'POST'}).then(() => location.href='/login')" class="text-sm hover:text-emerald-200 cursor-pointer bg-transparent border-none">Logout</button>
            </div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
    function appState() {
        return {
            dark: localStorage.getItem('sprout-dark') === 'true',
            toggleDark() {
                this.dark = !this.dark;
                localStorage.setItem('sprout-dark', this.dark);
            }
        };
    }
    // Register service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/static/sw.js');
        });
    }
    </script>
</body>
</html>
